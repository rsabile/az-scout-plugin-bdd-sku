<!-- BDD SKU plugin tab: SKU DB Cache -->
<div class="container-fluid px-3 py-2">
  <!-- Toolbar -->
  <div class="row g-2 mb-3 align-items-end">
    <div class="col-auto">
      <label for="bdd-currency" class="form-label mb-0 small">Currency</label>
      <select id="bdd-currency" class="form-select form-select-sm" style="width:100px">
        <option value="USD" selected>USD</option>
        <option value="EUR">EUR</option>
        <option value="GBP">GBP</option>
      </select>
    </div>
    <div class="col-auto">
      <label for="bdd-os-type" class="form-label mb-0 small">OS Type</label>
      <select id="bdd-os-type" class="form-select form-select-sm" style="width:100px">
        <option value="linux" selected>Linux</option>
        <option value="windows">Windows</option>
      </select>
    </div>
    <div class="col-auto">
      <button id="bdd-warm-retail" class="btn btn-sm btn-primary" title="Warm Retail Pricing Cache">
        <i class="bi bi-download me-1"></i>Warm Retail
      </button>
    </div>
    <div class="col-auto">
      <button id="bdd-warm-spot" class="btn btn-sm btn-warning" title="Warm Spot Cache (History + Eviction)">
        <i class="bi bi-lightning me-1"></i>Warm Spot
      </button>
    </div>
    <div class="col-auto">
      <button id="bdd-refresh-status" class="btn btn-sm btn-outline-secondary" title="Refresh Status">
        <i class="bi bi-arrow-clockwise me-1"></i>Refresh
      </button>
    </div>
    <div class="col-auto">
      <button class="btn btn-sm btn-outline-secondary" type="button"
              data-bs-toggle="collapse" data-bs-target="#bdd-advanced"
              title="Show/hide advanced options">
        <i class="bi bi-gear me-1"></i>Advanced
      </button>
    </div>
  </div>

  <!-- Advanced options (collapsed) -->
  <div class="collapse mb-3" id="bdd-advanced">
    <div class="card card-body bg-body-secondary">
      <div class="row g-2">
        <div class="col-md-6">
          <label for="bdd-sku-sample" class="form-label small">SKU Sample (comma-separated)</label>
          <textarea id="bdd-sku-sample" class="form-control form-control-sm" rows="2"
                    placeholder="standard_d2s_v5, standard_d4s_v5, ..."></textarea>
        </div>
        <div class="col-md-6">
          <label for="bdd-subscriptions" class="form-label small">Subscriptions for ARG (comma-separated)</label>
          <textarea id="bdd-subscriptions" class="form-control form-control-sm" rows="2"
                    placeholder="sub-id-1, sub-id-2, ..."></textarea>
        </div>
      </div>
    </div>
  </div>

  <!-- Status cards -->
  <div class="row g-3 mb-3">
    <!-- Retail -->
    <div class="col-md-4">
      <div class="card h-100">
        <div class="card-body">
          <h6 class="card-title"><i class="bi bi-tag me-1"></i>Retail Pricing</h6>
          <div id="bdd-status-retail" class="bdd-status-content">
            <span class="text-muted small">Loading…</span>
          </div>
        </div>
      </div>
    </div>
    <!-- Spot History -->
    <div class="col-md-4">
      <div class="card h-100">
        <div class="card-body">
          <h6 class="card-title"><i class="bi bi-graph-up me-1"></i>Spot Price History</h6>
          <div id="bdd-status-spot" class="bdd-status-content">
            <span class="text-muted small">Loading…</span>
          </div>
        </div>
      </div>
    </div>
    <!-- Eviction -->
    <div class="col-md-4">
      <div class="card h-100">
        <div class="card-body">
          <h6 class="card-title"><i class="bi bi-exclamation-triangle me-1"></i>Eviction Rates</h6>
          <div id="bdd-status-eviction" class="bdd-status-content">
            <span class="text-muted small">Loading…</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Progress / log area -->
  <div class="card mb-3">
    <div class="card-header d-flex justify-content-between align-items-center py-1">
      <span class="small fw-semibold"><i class="bi bi-terminal me-1"></i>Activity Log</span>
      <button id="bdd-clear-log" class="btn btn-sm btn-link text-muted p-0" title="Clear log">
        <i class="bi bi-x-circle"></i>
      </button>
    </div>
    <div class="card-body p-2" style="max-height: 200px; overflow-y: auto;">
      <pre id="bdd-log" class="mb-0 small" style="white-space: pre-wrap;"></pre>
    </div>
  </div>

  <!-- Error area -->
  <div id="bdd-error" class="alert alert-danger d-none" role="alert"></div>
</div>
