# BDD SKU plugin configuration for local development.
# Copy to ~/.config/az-scout/bdd-sku.toml
# or set AZ_SCOUT_BDD_SKU_CONFIG env var to the path.

[database]
host = "localhost"
port = 5432
dbname = "azscout"
user = "azscout"
password = "azscout"
sslmode = "disable"

[cache]
retail_ttl_hours = 12
spot_refresh_hours = 6
eviction_refresh_hours = 24
concurrency_limit = 8
