services:
  postgres:
    image: postgres:17
    container_name: azscout-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: azscout
      POSTGRES_USER: azscout
      POSTGRES_PASSWORD: azscout
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../src/az_scout_plugin_bdd_sku/sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro

volumes:
  pgdata:
