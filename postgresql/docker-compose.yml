# az-scout-plugin-bdd-sku – development environment
#
# Usage:
#   cd postgresql/
#   docker compose up -d
#
# From the host, az-scout (running outside compose) connects to:
#   postgres → localhost:5432
#
# Ingestion is a CLI one-shot run separately:
#   cd ingestion/ && docker build -t bdd-sku-ingestion . && docker run --rm --network postgresql_default \
#     -e POSTGRES_HOST=postgres bdd-sku-ingestion

services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: azscout
      POSTGRES_USER: azscout
      POSTGRES_PASSWORD: azscout
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U azscout -d azscout"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
